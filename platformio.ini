; tiny-reader — minimal e-paper EPUB reader for the LilyGo T5 4.7" V2.3 (Touch).

[platformio]
default_envs = T5-ePaper-S3
boards_dir = boards

[env:T5-ePaper-S3]
platform = espressif32@6.12.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters =
	default
	esp32_exception_decoder
build_flags =
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=0
	-DLILYGO_T5_EPD47_S3
	; route ESP-IDF logging in atomic14's parsers through printf
	-DUNIT_TEST
	; tinyxml2 OPF parsing needs more stack than the default 8KB loopTask
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
	-I lib/epub_parse
	-I lib/miniz
	-I lib/lilygo_epd47_s3/src
lib_deps =
	lewisxhe/SensorLib @ 0.3.1
	lennarthennigs/Button2 @ 2.3.2
	bblanchon/ArduinoJson@^7.4.2
	https://github.com/leethomason/tinyxml2.git#10.0.0
