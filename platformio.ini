; tiny-reader — minimal e-paper EPUB reader for the LilyGo T5 4.7" V2.3 (Touch).

[platformio]
default_envs = T5-ePaper-S3
boards_dir = boards

[env:T5-ePaper-S3]
platform = espressif32@6.12.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters =
	default
	esp32_exception_decoder
build_flags =
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=0
	-DLILYGO_T5_EPD47_S3
	; route ESP-IDF logging in atomic14's parsers through printf
	-DUNIT_TEST
	; tinyxml2 OPF parsing needs more stack than the default 8KB loopTask
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
	; AsyncTCP tuning — uploads >64 KB stall on defaults because the AsyncTCP
	; task gets starved on core 0 alongside WiFi and its 64-entry packet queue
	; fills up. Pin to core 1, double the queue, give it a larger stack.
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=1
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=128
	-DCONFIG_ASYNC_TCP_STACK_SIZE=8192
	-I lib/epub_parse
	-I lib/miniz
	-I lib/tjpgd
	-I lib/lilygo_epd47_s3/src
lib_deps =
	lewisxhe/SensorLib @ 0.3.1
	lennarthennigs/Button2 @ 2.3.2
	bblanchon/ArduinoJson@^7.4.2
	https://github.com/leethomason/tinyxml2.git#10.0.0
	; AsyncWebServer fork that supports Arduino-ESP32 v3 (the original
	; me-no-dev one is unmaintained and breaks on recent IDF).
	https://github.com/mathieucarbou/ESPAsyncWebServer.git
	https://github.com/mathieucarbou/AsyncTCP.git
